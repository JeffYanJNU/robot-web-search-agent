services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: robot_leads
      POSTGRES_USER: robot
      POSTGRES_PASSWORD: robot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U robot -d robot_leads"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://robot:robot@db:5432/robot_leads
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  dashboard:
    build: .
    env_file: .env
    environment:
      API_BASE_URL: http://api:8000
    command: streamlit run dashboard.py --server.address 0.0.0.0 --server.port 8501
    ports:
      - "8501:8501"
    depends_on:
      - api

volumes:
  postgres_data:

