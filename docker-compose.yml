services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: robot_leads
      POSTGRES_USER: robot
      POSTGRES_PASSWORD: robot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U robot -d robot_leads"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    env_file: .env
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ./已入库企业信息-2026.07.09.xlsx:/data/已入库企业信息-2026.07.09.xlsx:ro
      - model_config_data:/config
    environment:
      DATABASE_URL: postgresql+psycopg://robot:robot@db:5432/robot_leads
      BASELINE_WORKBOOK_PATH: /data/已入库企业信息-2026.07.09.xlsx
      MODEL_CONFIG_PATH: /config/model_configs.json
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  model_config_data:
